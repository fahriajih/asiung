<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>A Little Surprise, Made Just For You</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Caveat:wght@500;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* ============================================================
   0. FOUNDATIONS — palette, type, resets
   Palette: void navy, garnet gift-red, champagne gold, blush glow, parchment
   ============================================================ */
:root{
  --void:#050411;
  --void-2:#0a0820;
  --garnet:#7d1128;
  --garnet-light:#c2274f;
  --garnet-glow:#ff4d76;
  --gold:#e8c877;
  --gold-soft:#f4dfa8;
  --gold-dark:#a9793c;
  --blush:#ff8fab;
  --parchment:#f6ecd9;
  --parchment-2:#efe1c6;
  --ink:#3a2a1e;
  --glass: rgba(15, 10, 30, 0.45);
  --ff-display:'Cormorant Garamond', serif;
  --ff-hand:'Caveat', cursive;
  --ff-ui:'Jost', sans-serif;
}
*{ box-sizing:border-box; }
html,body{
  margin:0; padding:0; width:100%; height:100%;
  background:var(--void);
  color:var(--parchment);
  font-family:var(--ff-ui);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
body.scroll-ok{ overflow-y:auto; overflow-x:hidden; }
::selection{ background:var(--garnet-light); color:#fff; }

button{ font-family:inherit; }

@media (prefers-reduced-motion: reduce){
  *{ animation-duration:0.001s !important; transition-duration:0.001s !important; }
}

/* ============================================================
   1. CUSTOM CURSOR
   ============================================================ */
#custom-cursor{
  position:fixed; top:0; left:0; width:26px; height:26px;
  pointer-events:none; z-index:9999;
  transform:translate(-50%,-50%);
  transition:width .25s ease, height .25s ease, opacity .2s ease;
  will-change:transform;
  opacity:0;
}
#custom-cursor svg{ width:100%; height:100%; filter:drop-shadow(0 0 6px rgba(255,141,171,.85)); }
#custom-cursor.cursor-hover{
  width:44px; height:44px;
}
#custom-cursor.cursor-hover .heart-shape{ opacity:0; }
#custom-cursor.cursor-hover .ring-shape{ opacity:1; }
#custom-cursor .ring-shape{ opacity:0; transition:opacity .2s ease; }
.has-custom-cursor, .has-custom-cursor *{ cursor:none !important; }

/* ============================================================
   2. LOADING SCREEN
   ============================================================ */
#loading-screen{
  position:fixed; inset:0; z-index:500;
  background:radial-gradient(ellipse at 50% 40%, #10102a 0%, #050411 70%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:28px;
}
#loading-canvas{ position:absolute; inset:0; width:100%; height:100%; }
.loading-heart{ position:relative; z-index:2; width:74px; height:74px; }
.loading-heart svg{
  width:100%; height:100%;
  filter:drop-shadow(0 0 18px var(--garnet-glow)) drop-shadow(0 0 36px rgba(255,77,118,.5));
  animation:heartbeat 1.6s ease-in-out infinite;
}
@keyframes heartbeat{
  0%,100%{ transform:scale(1); }
  25%{ transform:scale(1.12); }
  40%{ transform:scale(0.96); }
  55%{ transform:scale(1.08); }
}
.loading-text{
  position:relative; z-index:2;
  font-family:var(--ff-display); font-style:italic; font-weight:500;
  font-size:clamp(1.1rem, 2.4vw, 1.6rem);
  letter-spacing:.04em;
  color:var(--gold-soft);
  text-shadow:0 0 20px rgba(232,200,119,.45);
}
.loading-bar-track{
  position:relative; z-index:2;
  width:min(280px, 60vw); height:3px; border-radius:3px;
  background:rgba(255,255,255,.08); overflow:hidden;
}
.loading-bar-fill{
  height:100%; width:0%; border-radius:3px;
  background:linear-gradient(90deg, var(--blush), var(--garnet-glow));
  box-shadow:0 0 12px var(--garnet-glow);
}
#loading-screen.fade-out{
  transition:opacity 1.1s ease;
  opacity:0; pointer-events:none;
}

/* ============================================================
   3. HERO / 3D STAGE
   ============================================================ */
#hero-canvas{ position:fixed; inset:0; width:100%; height:100%; z-index:1; display:block; }
#particle-canvas{ position:fixed; inset:0; width:100%; height:100%; z-index:50; pointer-events:none; }

.scene{
  position:fixed; inset:0; z-index:20;
  display:flex; align-items:center; justify-content:center;
}
.hidden{ display:none !important; }

#scene-hero{ z-index:15; pointer-events:none; }
.hero-copy{
  position:absolute;
  left:50%; top:66%; transform:translate(-50%,-30%);
  text-align:center; pointer-events:auto;
  width:min(680px, 88vw);
  opacity:0;
}
.hero-title{
  font-family:var(--ff-display); font-weight:500; font-style:italic;
  font-size:clamp(1.35rem, 4vw, 2.3rem);
  color:var(--parchment);
  text-shadow:0 0 24px rgba(255,141,171,.35), 0 0 60px rgba(194,39,79,.25);
  margin:0 0 30px;
  letter-spacing:.01em;
}
.open-btn{
  position:relative;
  border:1px solid rgba(232,200,119,.55);
  background:linear-gradient(180deg, rgba(125,17,40,.55), rgba(10,8,32,.65));
  color:var(--gold-soft);
  padding:16px 52px;
  border-radius:999px;
  font-family:var(--ff-ui); font-weight:500; font-size:.92rem;
  letter-spacing:.28em; text-transform:uppercase;
  backdrop-filter:blur(6px);
  box-shadow:0 0 0 rgba(255,141,171,0), inset 0 0 20px rgba(232,200,119,.06);
  transition:transform .35s cubic-bezier(.2,.9,.3,1.4), box-shadow .35s ease, background .35s ease;
  overflow:visible;
}
.open-btn:hover{
  transform:scale(1.07) translateY(-2px);
  box-shadow:0 0 34px rgba(255,141,171,.55), 0 0 70px rgba(194,39,79,.35);
  background:linear-gradient(180deg, rgba(194,39,79,.65), rgba(10,8,32,.7));
}
.open-btn:active{ transform:scale(0.98); }
.open-btn .spark{
  position:absolute; width:5px; height:5px; border-radius:50%;
  background:var(--gold-soft); opacity:0; pointer-events:none;
  box-shadow:0 0 8px var(--gold-soft);
}

/* ============================================================
   4. GENERIC SCENE-CARD LOOK (photo / letter / gallery / ending)
   ============================================================ */
.scene-inner{
  width:min(880px, 92vw);
  max-height:88vh;
  display:flex; flex-direction:column; align-items:center;
  text-align:center;
  gap:22px;
}
.scene-eyebrow{
  font-family:var(--ff-ui); letter-spacing:.35em; text-transform:uppercase;
  font-size:.68rem; color:var(--gold);
  opacity:.8;
}
.scene-title{
  font-family:var(--ff-display); font-style:italic; font-weight:500;
  font-size:clamp(1.4rem,3.6vw,2.4rem); color:var(--parchment);
  text-shadow:0 0 30px rgba(194,39,79,.3);
  margin:0;
}
.scene-btn{
  margin-top:6px;
  border:1px solid rgba(232,200,119,.5);
  background:rgba(20,14,36,.5);
  color:var(--gold-soft);
  padding:12px 34px; border-radius:999px;
  font-size:.78rem; letter-spacing:.22em; text-transform:uppercase;
  backdrop-filter:blur(6px);
  transition:all .3s ease;
}
.scene-btn:hover{ background:rgba(194,39,79,.4); transform:translateY(-2px); box-shadow:0 0 24px rgba(255,141,171,.4); }

/* ---- Photo scene ---- */
.photo-frame-wrap{
  position:relative;
  perspective:1200px;
}
.photo-frame{
  width:min(320px, 68vw); aspect-ratio:4/5;
  border-radius:14px;
  background:linear-gradient(160deg, rgba(255,255,255,.14), rgba(255,255,255,.02));
  border:1px solid rgba(255,255,255,.35);
  box-shadow:0 25px 60px rgba(0,0,0,.55), 0 0 60px rgba(255,141,171,.25), inset 0 0 30px rgba(255,255,255,.06);
  padding:14px;
  animation:photoFloat 6s ease-in-out infinite;
  transform-style:preserve-3d;
}
@keyframes photoFloat{
  0%,100%{ transform: translateY(0) rotate(-1.5deg); }
  50%{ transform: translateY(-16px) rotate(1.5deg); }
}
.photo-frame img, .photo-fallback{
  width:100%; height:100%; object-fit:cover; border-radius:8px; display:block;
}
.photo-fallback{
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px;
  background:linear-gradient(150deg, var(--garnet), var(--void-2));
  color:var(--gold-soft); font-family:var(--ff-display); font-style:italic; font-size:1rem;
}
.photo-fallback svg{ width:46px; height:46px; opacity:.8; }
.photo-reflection{
  width:min(320px, 68vw); height:60px; margin:0 auto; margin-top:-4px;
  background:linear-gradient(160deg, rgba(255,255,255,.14), rgba(255,255,255,.02));
  border-radius:14px;
  -webkit-mask-image:linear-gradient(to bottom, rgba(0,0,0,.35), transparent 85%);
  mask-image:linear-gradient(to bottom, rgba(0,0,0,.35), transparent 85%);
  transform:scaleY(-1);
  opacity:.5; filter:blur(1px);
}

/* ---- Letter scene ---- */
.envelope-wrap{ position:relative; width:min(360px, 80vw); height:min(240px,54vw); }
.envelope{
  position:absolute; inset:0;
  background:linear-gradient(160deg, var(--parchment), var(--parchment-2));
  border-radius:6px;
  box-shadow:0 25px 60px rgba(0,0,0,.5);
}
.envelope-flap{
  position:absolute; top:0; left:0; width:100%; height:52%;
  background:linear-gradient(160deg, var(--parchment-2), #e2d1ab);
  clip-path:polygon(0 0, 100% 0, 50% 100%);
  transform-origin:top center;
  transition:transform 1.1s cubic-bezier(.6,.1,.2,1);
  box-shadow:0 6px 12px rgba(0,0,0,.15);
}
.envelope-wrap.open .envelope-flap{ transform:rotateX(180deg); }
.envelope-seal{
  position:absolute; top:36%; left:50%; transform:translate(-50%,-50%);
  width:36px; height:36px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%, var(--garnet-light), var(--garnet) 70%);
  box-shadow:0 4px 10px rgba(0,0,0,.4);
  display:flex; align-items:center; justify-content:center;
  transition:opacity .4s ease, transform .4s ease;
  z-index:3;
}
.envelope-seal svg{ width:16px; height:16px; }
.envelope-wrap.open .envelope-seal{ opacity:0; transform:translate(-50%,-50%) scale(.4); }
.letter-paper{
  position:absolute; left:8%; width:84%; bottom:6%;
  min-height:60%;
  background:
    repeating-linear-gradient(0deg, rgba(0,0,0,.015) 0 2px, transparent 2px 4px),
    linear-gradient(180deg, #fbf3df, #f3e6c4);
  border-radius:4px;
  box-shadow:0 20px 45px rgba(0,0,0,.45);
  padding:22px 20px 26px;
  transform:translateY(8%);
  opacity:0;
  transition:transform 1.3s cubic-bezier(.2,.85,.25,1) .3s, opacity 1s ease .3s;
  z-index:2;
}
.envelope-wrap.open .letter-paper{ transform:translateY(-78%); opacity:1; }
.letter-text{
  font-family:var(--ff-hand); color:var(--ink); font-size:clamp(1rem,2.4vw,1.35rem);
  line-height:1.55; text-align:left; white-space:pre-line;
}
.letter-scene .scene-inner{ gap:28px; }
.letter-continue{ margin-top:8px; }

/* ---- Gallery scene ---- */
.gallery-grid{
  display:grid; grid-template-columns:repeat(auto-fit, minmax(140px,1fr));
  gap:16px; width:100%; max-height:52vh; overflow-y:auto; padding:6px;
}
.gallery-item{
  position:relative; border-radius:12px; overflow:hidden;
  aspect-ratio:1/1;
  box-shadow:0 10px 26px rgba(0,0,0,.4);
  opacity:0; transform:translateY(20px) scale(.94);
  transition:transform .5s cubic-bezier(.3,.9,.25,1.2), box-shadow .35s ease;
}
.gallery-item img, .gallery-fallback{ width:100%; height:100%; object-fit:cover; display:block; }
.gallery-fallback{
  display:flex; align-items:center; justify-content:center;
  background:linear-gradient(160deg, var(--garnet), var(--void-2));
  color:var(--gold-soft); font-size:1.6rem;
}
.gallery-item:hover{ transform:scale(1.06) !important; box-shadow:0 0 30px rgba(255,141,171,.5); z-index:2; }
.gallery-item::after{
  content:''; position:absolute; inset:0; border-radius:12px;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.25);
}

/* ---- Ending scene ---- */
#scene-ending{ background:radial-gradient(ellipse at 50% 50%, rgba(246,236,217,.08), transparent 65%); }
.ending-sub{
  font-family:var(--ff-display); font-style:italic; color:var(--gold-soft);
  font-size:clamp(1rem,2.2vw,1.3rem); opacity:.9; margin:0;
}

/* ============================================================
   5. MUSIC CONTROLLER (glassmorphism)
   ============================================================ */
#music-controller{
  position:fixed; right:20px; bottom:20px; z-index:200;
  display:flex; align-items:center; gap:12px;
  padding:10px 16px;
  background:var(--glass);
  border:1px solid rgba(255,255,255,.14);
  border-radius:999px;
  backdrop-filter:blur(14px) saturate(140%);
  box-shadow:0 10px 30px rgba(0,0,0,.35);
  opacity:0; transform:translateY(20px); pointer-events:none;
  transition:opacity .6s ease, transform .6s ease;
}
#music-controller.visible{ opacity:1; transform:translateY(0); pointer-events:auto; }
.mc-btn{
  width:34px; height:34px; border-radius:50%; border:none;
  background:rgba(255,255,255,.08); color:var(--gold-soft);
  display:flex; align-items:center; justify-content:center;
  transition:background .2s ease, transform .2s ease;
}
.mc-btn:hover{ background:rgba(255,141,171,.3); transform:scale(1.08); }
.mc-btn svg{ width:15px; height:15px; }
#mc-volume{
  -webkit-appearance:none; width:70px; height:3px; border-radius:3px;
  background:rgba(255,255,255,.25); outline:none;
}
#mc-volume::-webkit-slider-thumb{
  -webkit-appearance:none; width:11px; height:11px; border-radius:50%;
  background:var(--gold-soft); box-shadow:0 0 6px var(--gold-soft); cursor:pointer;
}

/* ============================================================
   6. RESPONSIVE
   ============================================================ */
@media (max-width:640px){
  .hero-copy{ top:70%; }
  .photo-frame{ width:72vw; }
  #music-controller{ right:12px; bottom:12px; padding:8px 12px; gap:8px; }
}
</style>
</head>
<body>

<!-- ============ CUSTOM CURSOR ============ -->
<div id="custom-cursor">
  <svg class="heart-shape" viewBox="0 0 24 24" fill="var(--blush)"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
  <svg class="ring-shape" viewBox="0 0 24 24" fill="none" stroke="var(--gold-soft)" stroke-width="1.4"><circle cx="12" cy="12" r="9"/></svg>
</div>

<!-- ============ LOADING SCREEN ============ -->
<div id="loading-screen">
  <canvas id="loading-canvas"></canvas>
  <div class="loading-heart">
    <svg viewBox="0 0 24 24" fill="url(#gradHeart)">
      <defs>
        <linearGradient id="gradHeart" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#ff8fab"/>
          <stop offset="100%" stop-color="#c2274f"/>
        </linearGradient>
      </defs>
      <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
    </svg>
  </div>
  <div class="loading-text">Preparing Something Special...</div>
  <div class="loading-bar-track"><div class="loading-bar-fill" id="loading-fill"></div></div>
</div>

<!-- ============ 3D STAGE ============ -->
<canvas id="hero-canvas"></canvas>
<canvas id="particle-canvas"></canvas>

<!-- ============ HERO SCENE (title + open button, over the 3D box) ============ -->
<div id="scene-hero" class="scene">
  <div class="hero-copy" id="hero-copy">
    <h1 class="hero-title">A Little Surprise Made Just For You ❤️</h1>
    <button class="open-btn" id="open-btn">Open Me</button>
  </div>
</div>

<!-- ============ PHOTO SCENE ============ -->
<div id="scene-photo" class="scene hidden">
  <div class="scene-inner">
    <div class="scene-eyebrow">For You</div>
    <div class="photo-frame-wrap">
      <div class="photo-frame" id="photo-frame"></div>
      <div class="photo-reflection" id="photo-reflection"></div>
    </div>
    <h2 class="scene-title" id="photo-caption"></h2>
    <button class="scene-btn" id="photo-continue">Keep Going</button>
  </div>
</div>

<!-- ============ LETTER SCENE ============ -->
<div id="scene-letter" class="scene letter-scene hidden">
  <div class="scene-inner">
    <div class="scene-eyebrow">A Letter</div>
    <div class="envelope-wrap" id="envelope-wrap">
      <div class="envelope"></div>
      <div class="envelope-flap"></div>
      <div class="envelope-seal">
        <svg viewBox="0 0 24 24" fill="var(--gold-soft)"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
      </div>
      <div class="letter-paper">
        <div class="letter-text" id="letter-text"></div>
      </div>
    </div>
    <button class="scene-btn letter-continue" id="letter-continue">Continue</button>
  </div>
</div>

<!-- ============ GALLERY SCENE ============ -->
<div id="scene-gallery" class="scene hidden">
  <div class="scene-inner">
    <div class="scene-eyebrow">Little Moments</div>
    <h2 class="scene-title">Our Favorite Memories</h2>
    <div class="gallery-grid" id="gallery-grid"></div>
    <button class="scene-btn" id="gallery-continue">Almost There</button>
  </div>
</div>

<!-- ============ ENDING SCENE ============ -->
<div id="scene-ending" class="scene hidden">
  <div class="scene-inner">
    <div class="scene-eyebrow">The End, For Now</div>
    <h2 class="scene-title" style="font-size:clamp(1.6rem,4.4vw,2.8rem)">Thank You For Being My Favorite Person ❤️</h2>
    <p class="ending-sub">Every day with you is my favorite story.</p>
    <button class="scene-btn" id="replay-btn">Replay</button>
  </div>
</div>

<!-- ============ MUSIC CONTROLLER ============ -->
<div id="music-controller">
  <button class="mc-btn" id="mc-play" title="Play/Pause">
    <svg id="mc-play-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    <svg id="mc-pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
  </button>
  <button class="mc-btn" id="mc-mute" title="Mute">
    <svg id="mc-vol-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3 10v4h4l5 5V5L7 10H3z"/></svg>
    <svg id="mc-mute-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M3 10v4h4l5 5V5L7 10H3zm13.5 2l2.5 2.5-1.4 1.4L15.1 13.4l-2.5 2.5-1.4-1.4 2.5-2.5-2.5-2.5 1.4-1.4 2.5 2.5 2.5-2.5 1.4 1.4z"/></svg>
  </button>
  <input type="range" id="mc-volume" min="0" max="100" value="55">
</div>

<!-- ============ CDN LIBRARIES ============ -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

/* ================================================================
   ENGINE — you shouldn't need to edit anything below this line.

/* -------------------- helpers -------------------- */
const isTouch = matchMedia('(hover:none), (pointer:coarse)').matches;
const isSmall = window.innerWidth < 720;
const $ = (id)=>document.getElementById(id);

/* -------------------- custom cursor -------------------- */
const cursorEl = $('custom-cursor');
if(!isTouch){
  document.body.classList.add('has-custom-cursor');

/* ================================================================
   LOADING SCREEN — starfield + nebula on a 2D canvas, progress bar
   ================================================================ */
(function loadingScreen(){
  const canvas = $('loading-canvas');
  const ctx = canvas.getContext('2d');
  let w,h,stars=[],nebulae=[];
  function size(){
    w = canvas.width = window.innerWidth * Math.min(devicePixelRatio,2);
    h = canvas.height = window.innerHeight * Math.min(devicePixelRatio,2);
    canvas.style.width = window.innerWidth+'px';
    canvas.style.height = window.innerHeight+'px';
  }
  size();
  const starCount = isSmall ? 140 : 260;
  for(let i=0;i<starCount;i++){
    stars.push({ x:Math.random()*w, y:Math.random()*h, r:Math.random()*1.6+0.3,
      tw:Math.random()*Math.PI*2, speed:Math.random()*0.02+0.01 });
  }
  const nebColors = ['rgba(194,39,79,0.18)','rgba(255,141,171,0.14)','rgba(232,200,119,0.08)'];
  for(let i=0;i<3;i++){
    nebulae.push({ x:Math.random()*w, y:Math.random()*h, r:Math.max(w,h)*0.35,
      color:nebColors[i], dx:(Math.random()-0.5)*0.15, dy:(Math.random()-0.5)*0.15 });
  }
  let raf;
  function draw(){
    ctx.clearRect(0,0,w,h);
    ctx.fillStyle = '#050411'; ctx.fillRect(0,0,w,h);
    nebulae.forEach(n=>{
      n.x += n.dx; n.y += n.dy;
      const g = ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
      g.addColorStop(0, n.color); g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2); ctx.fill();
    });
    stars.forEach(s=>{
      s.tw += s.speed;
      const alpha = 0.4 + Math.sin(s.tw)*0.4;
      ctx.beginPath();
      ctx.fillStyle = `rgba(255,255,255,${Math.max(0,alpha)})`;
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    });
    raf = requestAnimationFrame(draw);
  }
  draw();
  window.addEventListener('resize', size);

  // progress bar + fade out
  const fill = $('loading-fill');
  const screen = $('loading-screen');
  let progress = 0;
  const duration = 3800 + Math.random()*800;
  const start = performance.now();
  function tick(now){
    progress = Math.min(1, (now-start)/duration);
    fill.style.width = (progress*100)+'%';
    if(progress<1){ requestAnimationFrame(tick); }
    else{
      setTimeout(()=>{
        screen.classList.add('fade-out');
        gsap.fromTo('#hero-copy', {opacity:0, y:24}, {opacity:1, y:0, duration:1.4, delay:0.4, ease:'power2.out'});
        setTimeout(()=>{ screen.remove(); cancelAnimationFrame(raf); }, 1300);
      }, 250);
    }
  }
  requestAnimationFrame(tick);
})();

function animate(){
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  if(idleActive){
    giftGroup.rotation.y = t*0.35 + Math.sin(t*0.6)*0.08;
    giftGroup.position.y = -0.3 + Math.sin(t*1.1)*0.12;
    // occasional gentle shake
    giftGroup.rotation.z = Math.sin(t*3.7)*0.01*Math.max(0, Math.sin(t*0.5));
    targetRotY = mouseX*0.25;
    targetRotX = -mouseY*0.12;
    giftGroup.rotation.y += targetRotY*0.3;
    giftGroup.rotation.x += (targetRotX*0.3 - giftGroup.rotation.x)*0.05;
  }

  // camera parallax
  camera.position.x += ( (mouseX*0.6) - (camera.position.x - camBase.x) - (camera.position.x-camBase.x) )*0.02;
  camera.position.x = camBase.x + (mouseX*0.5)*0.6 + (camera.position.x-camBase.x)*0;

  dust.rotation.y = t*0.02;
  dust.position.y = Math.sin(t*0.3)*0.3;
  nebulaGroup.children.forEach((sp,i)=>{ sp.material.rotation = t*0.02*(i%2?1:-1); });

  renderer.render(scene, camera);
}

const pCanvas = $('particle-canvas');
const pCtx = pCanvas.getContext('2d');
function sizeParticleCanvas(){

let particles = [];
const confettiColors = ['#ff8fab','#e8c877','#c2274f','#ffffff','#f6ecd9'];

function spawnConfetti(count){
  const cx = window.innerWidth/2, cy = window.innerHeight*0.42;
  for(let i=0;i<count;i++){
    const angle = Math.random()*Math.PI*2;
    const speed = 2+Math.random()*6;
    particles.push({
      type:'confetti', x:cx, y:cy,
      vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed - 3,
      size:4+Math.random()*5, rot:Math.random()*Math.PI, vrot:(Math.random()-0.5)*0.3,
      color:confettiColors[(Math.random()*confettiColors.length)|0],
      life:1, decay:0.006+Math.random()*0.006, gravity:0.09
    });
  }
}
function spawnHearts(count){
  const cx = window.innerWidth/2, cy = window.innerHeight*0.5;
  for(let i=0;i<count;i++){
    const angle = -Math.PI/2 + (Math.random()-0.5)*Math.PI*1.4;
    const speed = 1+Math.random()*3.4;
    particles.push({
      type:'heart', x:cx+(Math.random()-0.5)*80, y:cy+(Math.random()-0.5)*40,
      vx:Math.cos(angle)*speed*0.5, vy:Math.sin(angle)*speed - 1.2,
      size:8+Math.random()*16, rot:(Math.random()-0.5)*0.6, vrot:(Math.random()-0.5)*0.02,
      color: Math.random()>0.5 ? '#ff8fab' : '#e8c877',
      life:1, decay:0.0035+Math.random()*0.004, gravity:-0.012, sway:Math.random()*Math.PI*2
    });
  }
}
function drawHeartPath(ctx,size){
  ctx.beginPath();
  const s = size/16;
  ctx.moveTo(0, 4*s);
  ctx.bezierCurveTo(0,-2*s, -8*s,-2*s, -8*s,4*s);
  ctx.bezierCurveTo(-8*s,9*s, 0,12*s, 0,16*s);
  ctx.bezierCurveTo(0,12*s, 8*s,9*s, 8*s,4*s);
  ctx.bezierCurveTo(8*s,-2*s, 0,-2*s, 0,4*s);
  ctx.closePath();
}
function particleLoop(){
  requestAnimationFrame(particleLoop);
  pCtx.clearRect(0,0,window.innerWidth,window.innerHeight);
  particles = particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.vy += p.gravity*0.05;
    p.x += p.vx; p.y += p.vy; p.rot += p.vrot;
    p.life -= p.decay;
    if(p.type==='heart'){ p.sway+=0.05; p.x += Math.sin(p.sway)*0.4; }
    pCtx.save();
    pCtx.globalAlpha = Math.max(0,p.life);
    pCtx.translate(p.x,p.y);
    pCtx.rotate(p.rot);
    pCtx.shadowColor = p.color; pCtx.shadowBlur = p.type==='heart'?12:6;
    pCtx.fillStyle = p.color;
    if(p.type==='confetti'){
      pCtx.fillRect(-p.size/2,-p.size/3,p.size,p.size*0.6);
    } else {
      drawHeartPath(pCtx, p.size);
      pCtx.fill();
    }
    pCtx.restore();
  });
}
particleLoop();

/* ================================================================
   SOUND — Tone.js generative music + gentle sfx (no external files)
   ================================================================ */
let toneStarted = false, musicPlaying = false, isMuted = false;
let masterVol, pad, arpSynth, arpLoop, reverb;
let sfxClick, sfxSparkle, sfxPaper, sfxMagic;

function buildAudio(){
  masterVol = new Tone.Volume(Tone.gainToDb(CONFIG.musicVolume)).toDestination();
  reverb = new Tone.Reverb({decay:6, wet:0.45}).connect(masterVol);

  pad = new Tone.PolySynth(Tone.FMSynth, {
    harmonicity:1.5, modulationIndex:2,
    envelope:{attack:2.2, decay:1, sustain:0.6, release:4},
    volume:-14
  }).connect(reverb);

  arpSynth = new Tone.FMSynth({
    harmonicity:2, modulationIndex:1.5,
    envelope:{attack:0.6, decay:0.8, sustain:0.3, release:2},
    volume:-18
  }).connect(reverb);

  const chords = [['C4','E4','G4','B4'],['A3','C4','E4','G4'],['F3','A3','C4','E4'],['G3','B3','D4','F4']];
  let chordIdx = 0;
  new Tone.Loop((time)=>{
    pad.triggerAttackRelease(chords[chordIdx % chords.length], '2n', time);
    chordIdx++;
  }, '2n').start(0);

  const arpNotes = ['E4','G4','B4','C5','B4','G4'];
  let noteIdx = 0;
  arpLoop = new Tone.Loop((time)=>{
    arpSynth.triggerAttackRelease(arpNotes[noteIdx % arpNotes.length], '8n', time);
    noteIdx++;
  }, '4n').start('2n');

  // sfx
  sfxClick = new Tone.MembraneSynth({volume:-16}).connect(masterVol);
  sfxSparkle = new Tone.MetalSynth({volume:-20, envelope:{attack:0.001, decay:0.4, release:0.2}}).connect(masterVol);
  sfxPaper = new Tone.NoiseSynth({volume:-28, noise:{type:'pink'}, envelope:{attack:0.01, decay:0.3, sustain:0}}).connect(masterVol);
  sfxMagic = new Tone.PolySynth(Tone.Synth, {volume:-16, envelope:{attack:0.01, decay:0.3, sustain:0}}).connect(masterVol);
}

async function ensureAudioStarted(){
  if(toneStarted) return;
  await Tone.start();
  buildAudio();
  Tone.Transport.start();
  toneStarted = true;
}
function playClick(){ if(toneStarted && !isMuted) sfxClick.triggerAttackRelease('C2','8n'); }
function playSparkle(){ if(toneStarted && !isMuted) sfxSparkle.triggerAttackRelease('16n'); }
function playPaper(){ if(toneStarted && !isMuted) sfxPaper.triggerAttackRelease('8n'); }
function playMagic(){ if(toneStarted && !isMuted) sfxMagic.triggerAttackRelease(['C5','E5','G5'],'8n'); }

function startMusicFadeIn(){
  $('music-controller').classList.add('visible');
  musicPlaying = true;
  updatePlayIcon();
  if(masterVol){
    masterVol.volume.value = -40;
    masterVol.volume.linearRampTo(Tone.gainToDb(CONFIG.musicVolume), 3);
  }
}
function updatePlayIcon(){
  $('mc-play-icon').style.display = musicPlaying ? 'none' : 'block';
  $('mc-pause-icon').style.display = musicPlaying ? 'block' : 'none';
}
function updateMuteIcon(){
  $('mc-vol-icon').style.display = isMuted ? 'none' : 'block';
  $('mc-mute-icon').style.display = isMuted ? 'block' : 'none';
}

$('mc-play').addEventListener('click', async ()=>{
  await ensureAudioStarted();
  if(musicPlaying){ Tone.Transport.pause(); musicPlaying=false; }
  else{ Tone.Transport.start(); musicPlaying=true; }
  updatePlayIcon();
});
$('mc-mute').addEventListener('click', ()=>{
  isMuted = !isMuted;
  if(masterVol) masterVol.mute = isMuted;
  updateMuteIcon();
});
$('mc-volume').addEventListener('input', (e)=>{
  const v = e.target.value/100;
  if(masterVol) masterVol.volume.value = Tone.gainToDb(Math.max(0.0001,v));
  if(v>0 && isMuted){ isMuted=false; if(masterVol) masterVol.mute=false; updateMuteIcon(); }
});

/* ================================================================
   OPEN SEQUENCE — the cinematic unwrapping timeline
   ================================================================ */
let hasOpened = false;
openBtn.addEventListener('click', async ()=>{
  if(hasOpened) return;
  hasOpened = true;
  playClick();
  await ensureAudioStarted();

  gsap.to('#hero-copy', { opacity:0, y:-20, duration:0.7, ease:'power2.in' });

  const tl = gsap.timeline({ defaults:{ ease:'power2.inOut' } });

  // 1) camera pushes in, idle rotation stops
  tl.add(()=>{ idleActive = false; });
  tl.to(camera.position, { z:5.2, y:0.3, duration:1.6 }, 0);
  tl.to(giftGroup.rotation, { y: giftGroup.rotation.y + 0.35, duration:1.6 }, 0);

  // 2) ribbon unwraps and drifts away
  tl.add(()=>{ playPaper(); }, 1.3);
  tl.to(ribbonV.position, { x:-2.6, y:'+=0.6', duration:1.1 }, 1.3);
  tl.to(ribbonV.rotation, { z:1.4, duration:1.1 }, 1.3);
  tl.to(ribbonV.material, { opacity:0, duration:1.1, onStart:()=>{ ribbonV.material.transparent=true; } }, 1.3);
  tl.to(ribbonH.position, { z:2.6, y:'+=0.6', duration:1.1 }, 1.4);
  tl.to(ribbonH.rotation, { x:1.4, duration:1.1 }, 1.4);
  tl.to(ribbonH.material, { opacity:0, duration:1.1, onStart:()=>{ ribbonH.material.transparent=true; } }, 1.4);

  // 3) lid swings open like a real hinge
  tl.add(()=>{ playMagic(); }, 2.5);
  tl.to(lidPivot.rotation, { x:-2.3, duration:1.3, ease:'back.out(1.4)' }, 2.5);

  // 4) golden light + bloom-fake burst + lens flare
  tl.to(innerLight, { intensity:3.2, duration:0.8 }, 2.7);
  tl.to(insideGlow.material, { opacity:0.9, duration:0.6 }, 2.7);
  tl.to(insideGlow.scale, { x:6, y:6, duration:1.1, ease:'power3.out' }, 2.7);
  flareSprites.forEach((s,i)=>{
    tl.to(s.scale, { x:s.userData.targetScale, y:s.userData.targetScale, duration:0.9, ease:'power3.out' }, 2.75+i*0.05);
    tl.to(s.material, { opacity:s.userData.targetOpacity, duration:0.5, yoyo:true, repeat:1, ease:'power1.inOut' }, 2.75+i*0.05);
  });

  // 5) confetti + hearts burst, sparkle sfx
  tl.add(()=>{ spawnConfetti(isSmall?60:120); playSparkle(); }, 2.9);
  tl.add(()=>{ spawnHearts(isSmall?40:90); }, 3.1);

  // 6) settle the burst, dim inner light back down slightly
  tl.to(innerLight, { intensity:1.4, duration:1.4 }, 3.6);
  tl.to(insideGlow.material, { opacity:0.4, duration:1.4 }, 3.6);

  // 7) start music, then move into the Photo scene
  tl.add(()=>{ startMusicFadeIn(); }, 3.2);
  tl.add(()=>{ goToScene('photo'); }, 4.6);
});

/* ================================================================
   SCENE MANAGER — Photo -> Letter -> Gallery -> Ending
   ================================================================ */
function fallbackHeartIcon(){
  return `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
}

function buildPhotoScene(){
  const frame = $('photo-frame');
  const reflection = $('photo-reflection');
  if(CONFIG.mainPhoto.src){
    frame.innerHTML = `<img src="${CONFIG.mainPhoto.src}" alt="${CONFIG.mainPhoto.caption||''}" loading="lazy">`;
    reflection.style.backgroundImage = `url(${CONFIG.mainPhoto.src})`;
    reflection.style.backgroundSize = 'cover';
    reflection.style.backgroundPosition = 'center';
  } else {
    frame.innerHTML = `<div class="photo-fallback">${fallbackHeartIcon()}<span>${CONFIG.mainPhoto.caption||'Our Photo'}</span></div>`;
  }
  $('photo-caption').textContent = CONFIG.mainPhoto.caption || '';
}

function buildLetterScene(){
  let text = (typeof CONFIG.letter === 'string') ? CONFIG.letter : '';
  text = text.replaceAll('{{name}}', CONFIG.recipientName || '')
             .replaceAll('{{sender}}', CONFIG.senderName || '');
  $('letter-text').textContent = text;
}

function buildGalleryScene(){
  const grid = $('gallery-grid');
  grid.innerHTML = '';
  (CONFIG.gallery||[]).forEach((item,i)=>{
    const cell = document.createElement('div');
    cell.className = 'gallery-item';
    if(item.src){
      cell.innerHTML = `<img src="${item.src}" alt="${item.label||''}" loading="lazy">`;
    } else {
      cell.innerHTML = `<div class="gallery-fallback">${fallbackHeartIcon()}</div>`;
    }
    grid.appendChild(cell);
  });
}

let currentScene = null;
function goToScene(name){
  const scenes = { photo:'scene-photo', letter:'scene-letter', gallery:'scene-gallery', ending:'scene-ending' };
  if(currentScene){
    const prevEl = $(scenes[currentScene]);
    gsap.to(prevEl, { opacity:0, duration:0.6, onComplete:()=>{ prevEl.classList.add('hidden'); prevEl.style.opacity=''; showNext(name); } });
  } else {
    showNext(name);
  }
  currentScene = name;
}
function showNext(name){
  const scenes = { photo:'scene-photo', letter:'scene-letter', gallery:'scene-gallery', ending:'scene-ending' };
  const el = $(scenes[name]);
  el.classList.remove('hidden');
  gsap.fromTo(el, {opacity:0}, {opacity:1, duration:0.9});

  if(name==='photo'){ buildPhotoScene(); }
  if(name==='letter'){
    buildLetterScene();
    setTimeout(()=>{ $('envelope-wrap').classList.add('open'); playPaper(); }, 500);
  }
  if(name==='gallery'){
    buildGalleryScene();
    setTimeout(()=>{
      document.querySelectorAll('.gallery-item').forEach((el,i)=>{
        gsap.to(el, { opacity:1, y:0, scale:1, duration:0.6, delay:i*0.12, ease:'back.out(1.6)' });
      });
    }, 200);
  }
  if(name==='ending'){ spawnHearts(isSmall?30:60); playMagic(); }
}

$('photo-continue').addEventListener('click', ()=>{ playClick(); goToScene('letter'); });
$('letter-continue').addEventListener('click', ()=>{ playClick(); spawnHearts(isSmall?50:100); setTimeout(()=>goToScene('gallery'), 300); });
$('gallery-continue').addEventListener('click', ()=>{ playClick(); goToScene('ending'); });
$('replay-btn').addEventListener('click', ()=>{ playClick(); setTimeout(()=>location.reload(), 250); });

})();
</script>
